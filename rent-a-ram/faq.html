<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — RentARAM</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #00ff88;
  --red: #ff4466;
  --yellow: #ffcc00;
  --bg: #0a0a0f;
  --bg2: #0f0f1a;
  --bg3: #14141f;
  --border: #00ff8818;
  --border2: #00ff8840;
  --text-dim: #00ff8855;
  --text-mid: #00ff8899;
}

body {
  font-family: 'Share Tech Mono', monospace;
  background: var(--bg);
  color: var(--green);
  min-height: 100vh;
  
}

a { color: inherit; text-decoration: none; }

body::before {
  content: '';
  pointer-events: none;
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,255,136,0.012) 3px, rgba(0,255,136,0.012) 4px
  );
  z-index: 9000;
}

/* NAV */
nav {
  background: var(--bg);
  border-bottom: 1px solid var(--border2);
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; letter-spacing: 3px; }
.logo span { color: var(--red); }
.nav-links { display: flex; }
.nav-links a {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-mid);
  padding: 0 18px;
  height: 56px;
  display: flex;
  align-items: center;
  border-left: 1px solid var(--border);
  transition: color 0.15s, background 0.15s;
}
.nav-links a:hover, .nav-links a.active { color: var(--green); background: rgba(0,255,136,0.05); }

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 32px 40px;
  text-align: center;
  font-size: 10px;
  color: var(--text-dim);
  line-height: 2.2;
  margin-top: 80px;
}
.blink { animation: blink 1.2s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* HERO */
.hero { text-align: center; padding: 70px 40px 50px; border-bottom: 1px solid var(--border); }
.badge {
  display: inline-block;
  background: rgba(255,68,102,0.12);
  border: 1px solid var(--red);
  color: var(--red);
  font-size: 10px;
  letter-spacing: 3px;
  padding: 4px 14px;
  margin-bottom: 22px;
}
.hero h1 { font-family: 'Orbitron', monospace; font-size: 46px; font-weight: 900; line-height: 1.1; margin-bottom: 14px; }
.hero h1 span { color: var(--red); }
.hero p { font-size: 13px; color: var(--text-mid); max-width: 500px; margin: 0 auto 10px; line-height: 1.7; }
.hero-price { font-family: 'Orbitron', monospace; font-size: 12px; color: var(--yellow); margin-top: 10px; letter-spacing: 2px; }

/* BUTTONS */
.btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 12px 28px;
  border: 1px solid var(--green);
  background: transparent;
  color: var(--green);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: inline-block;
}
.btn:hover { background: rgba(0,255,136,0.1); }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--green); color: var(--bg); font-family: 'Orbitron', monospace; font-weight: 700; }
.btn-primary:hover { background: #00ffaa; color: var(--bg); }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: rgba(255,68,102,0.1); }
.btn-block { display: block; width: 100%; text-align: center; }

/* CARDS */
.card { background: var(--bg2); border: 1px solid var(--border2); padding: 24px; }
.card-title { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 2px; margin-bottom: 16px; }

/* SECTION TITLES */
.section-title { font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 3px; text-align: center; margin-bottom: 32px; }
.section-title::before { content: '// '; color: var(--text-dim); }

/* FORM */
label { font-size: 11px; letter-spacing: 1px; color: var(--text-mid); display: block; margin-bottom: 6px; }
input[type=text], input[type=email], input[type=number], input[type=password], select, textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--green); }
input[type=range] { width: 100%; accent-color: var(--green); }
select option { background: var(--bg2); }
.form-row { margin-bottom: 20px; }

/* TABLE */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; font-size: 10px; letter-spacing: 2px; color: var(--text-dim); padding: 10px 12px; border-bottom: 1px solid var(--border2); }
td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-mid); vertical-align: middle; }
tr:hover td { background: rgba(0,255,136,0.03); }

/* STATUS BADGES */
.status { font-size: 10px; letter-spacing: 1px; padding: 3px 10px; }
.status-active { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid var(--border2); }
.status-expired { background: rgba(255,68,102,0.1); color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
.status-pending { background: rgba(255,204,0,0.1); color: var(--yellow); border: 1px solid rgba(255,204,0,0.3); }

/* METRICS */
.metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin: 0 0 40px;
}
.metric { background: var(--bg2); padding: 24px 20px; text-align: center; }
.metric-val { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; }
.metric-val.red { color: var(--red); }
.metric-val.yellow { color: var(--yellow); }
.metric-label { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); margin-top: 6px; }

/* TOAST */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg2); border: 1px solid var(--green);
  color: var(--green); font-size: 12px; padding: 12px 24px;
  letter-spacing: 1px; transition: transform 0.3s ease;
  z-index: 9999; white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* LAYOUT */
.page { max-width: 760px; margin: 0 auto; padding: 48px 24px; }
.page-wide { max-width: 980px; margin: 0 auto; padding: 48px 24px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
@media (max-width: 600px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  nav { padding: 0 16px; }
  .nav-links a { padding: 0 10px; font-size: 9px; }
  .hero h1 { font-size: 28px; }
}

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

/* HIGHLIGHT TEXT */
.hl { color: var(--green); }
.hl-red { color: var(--red); }
.hl-yellow { color: var(--yellow); }
.dim { color: var(--text-dim); }
.mid { color: var(--text-mid); }
.mono { font-family: 'Orbitron', monospace; }


/* CUSTOM CURSOR */
*, *::before, *::after { cursor: none !important; }
#cursor-outer {
  position: fixed; pointer-events: none; z-index: 99999;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid rgba(0,255,136,0.6);
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
}
#cursor-inner {
  position: fixed; pointer-events: none; z-index: 99999;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  transform: translate(-50%, -50%);
}
body.cursor-hover #cursor-outer { width: 52px; height: 52px; border-color: var(--green); background: rgba(0,255,136,0.06); }
body.cursor-text #cursor-outer { width: 4px; height: 28px; border-radius: 2px; border-color: var(--green); }


/* CUSTOM CURSOR */
*, *::before, *::after { cursor: none !important; }
#cursor-outer {
  position: fixed; pointer-events: none; z-index: 99999;
  width: 32px; height: 32px;
  border: 1px solid rgba(0,255,136,0.5);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
}
#cursor-inner {
  position: fixed; pointer-events: none; z-index: 99999;
  width: 5px; height: 5px;
  background: #00ff88;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.15s, height 0.15s, background 0.15s;
}
body.cursor-hover #cursor-outer {
  width: 44px; height: 44px;
  border-color: rgba(0,255,136,0.8);
  background: rgba(0,255,136,0.06);
}
body.cursor-hover #cursor-inner {
  width: 6px; height: 6px;
  background: #00ffaa;
}
body.cursor-text #cursor-outer {
  width: 3px; height: 28px;
  border-radius: 2px;
  border-color: rgba(0,255,136,0.7);
}
body.cursor-text #cursor-inner { opacity: 0; }

</style>
  <style>
    .faq-item { border-bottom: 1px solid var(--border); }
    .faq-q {
      width: 100%; background: none; border: none; color: var(--green);
      font-family: 'Share Tech Mono', monospace; font-size: 13px; text-align: left;
      padding: 20px 0; cursor: pointer; display: flex; justify-content: space-between;
      align-items: center; letter-spacing: 1px;
    }
    .faq-q:hover { color: #fff; }
    .faq-arrow { font-size: 16px; transition: transform 0.2s; flex-shrink: 0; }
    .faq-a { font-size: 12px; color: var(--text-mid); line-height: 1.9; padding-bottom: 20px; display: none; }
    .faq-item.open .faq-arrow { transform: rotate(90deg); }
    .faq-item.open .faq-a { display: block; }
  </style>
<link rel="icon" type="image/png" href="/rent-a-ram/favicon.png">
</head>
<body>
<div id="cursor-outer"></div>
<div id="cursor-inner"></div>


<div id="nav-placeholder"></div>

<div class="hero" style="padding-bottom:40px;">
  <div class="badge">FREQUENTLY ASKED QUESTIONS</div>
  <h1>You Have <span>Concerns.</span></h1>
  <p>We understand. Renting RAM is an unusual life choice. Here are answers to the questions we get most often.</p>
</div>

<div class="page">

  <div class="section-title" style="margin-top:48px;">GENERAL</div>

  <div id="faq-list"></div>

  <div style="text-align:center;margin-top:48px;">
    <p class="mid" style="font-size:12px;margin-bottom:16px;">Still confused? Good. That's the intended experience.</p>
    <a href="/rent-a-ram/contact.html"" class="btn">CONTACT US ANYWAY</a>
  </div>

</div>

<div id="footer-placeholder"></div>
<script src="main.js">
  // Custom cursor
  const _co = document.getElementById('cursor-outer');
  const _ci = document.getElementById('cursor-inner');
  let _mx=0,_my=0,_ox=0,_oy=0;
  document.addEventListener('mousemove', e => { _mx=e.clientX; _my=e.clientY; _ci.style.left=_mx+'px'; _ci.style.top=_my+'px'; });
  (function _anim(){ _ox+=(_mx-_ox)*0.12; _oy+=(_my-_oy)*0.12; _co.style.left=_ox+'px'; _co.style.top=_oy+'px'; requestAnimationFrame(_anim); })();
  document.querySelectorAll('a,button,.btn,.card,.plan-card,.chat-item,.faq-q').forEach(el => {
    el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-hover'));
  });
  document.querySelectorAll('input,textarea,select').forEach(el => {
    el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-text'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-text'));
  });

</script>
<script>
  const faqs = [
    {
      q: "Why would I rent RAM instead of just buying it?",
      a: "Excellent question. You wouldn't. RAM costs about $3–5 per GB to buy. We charge $100 per GB per hour. The only rational explanation is that you're running a one-hour experiment, lost a bet, or have a corporate card you want to abuse."
    },
    {
      q: "Is this real?",
      a: "Philosophically speaking, what is real? Our website is real. Our prices are real. Whether the RAM you receive is real is a question best left to your OS's memory diagnostics tool."
    },
    {
      q: "What happens when my rental expires?",
      a: "Your RAM is deallocated. Any processes using it will crash. We recommend saving your work at least 72 hours before expiry, just to be safe. We send no reminders."
    },
    {
      q: "Can I extend my rental?",
      a: "Yes. Place a new order and we'll provision fresh RAM. Continuity between old and new RAM is not guaranteed. In fact, nothing is guaranteed."
    },
    {
      q: "Do you offer refunds?",
      a: "No. This is stated clearly in: the homepage, the pricing page, the order page, the checkout button label, the confirmation email subject line, and this FAQ. We have thought very hard about refunds and our answer remains no."
    },
    {
      q: "What RAM types do you offer?",
      a: "DDR4 (standard), DDR5 (premium, +$20/GB/hr), DDR3 (legacy, we dig it out of a box), and ECC (error-correcting, for people who are worried about bit flips and also about everything else). All types are physically identical. The type selection is mostly vibes."
    },
    {
      q: "Is my data secure?",
      a: "Your data is encrypted in transit using HTTPS. Once in our system it is stored in plaintext in a MySQL database that hasn't been updated since 2019. Our security posture is best described as 'hopeful'."
    },
    {
      q: "What is the Swindon Pi?",
      a: "Our third data centre. It is a Raspberry Pi 4 (4GB) running in a cupboard under the stairs in a semi-detached house in Swindon. It powers approximately 2% of our infrastructure and 100% of our character. It is frequently degraded."
    },
    {
      q: "Can I get ECC RAM?",
      a: "Yes, for an additional $50/GB/hr surcharge. ECC RAM corrects single-bit memory errors automatically. At our prices, the errors you're making are not the bit-flip kind."
    },
    {
      q: "How fast is the RAM?",
      a: "Very fast. Specific speeds are a trade secret. We can confirm it is faster than HDD, slower than CPU cache, and priced as if it were solid gold. DDR5 customers get a small certificate acknowledging that they chose the fast tier."
    },
    {
      q: "What is your uptime SLA?",
      a: "We target 99.2% uptime, which we describe as 'vibes-adjusted'. This means we aim for 99.2% but reserve the right to re-classify any downtime as 'scheduled maintenance (retroactive)'. We have never missed our SLA by our own accounting."
    },
    {
      q: "Do you have a free tier?",
      a: "No. We considered it and decided against it on the grounds that it would be even more absurd than what we currently offer, and we do have some standards."
    },
    {
      q: "Can I rent RAM for someone else as a gift?",
      a: "Yes. We recommend pairing it with a heartfelt note explaining why you thought this was appropriate. Suggested occasions: birthdays, apologies, corporate onboarding, or passive-aggressive gestures."
    },
    {
      q: "Who are you people?",
      a: "RentARAM Ltd was founded in 2026 by two people who thought it would be funny. It has since grown into a company with a CSS file, a shared JavaScript utility library, and at least five HTML pages. We consider this a significant achievement."
    },
  ];

  const list = document.getElementById('faq-list');
  faqs.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'faq-item';
    div.innerHTML = `
      <button class="faq-q" onclick="toggle(${i})">
        <span>${f.q}</span>
        <span class="faq-arrow">›</span>
      </button>
      <div class="faq-a">${f.a}</div>
    `;
    list.appendChild(div);
  });

  function toggle(i) {
    const items = document.querySelectorAll('.faq-item');
    items[i].classList.toggle('open');
  }
</script>

<!-- Custom cursor -->
<div id="cursor-outer"></div>
<div id="cursor-inner"></div>
<script>
(function(){
  var outer = document.getElementById('cursor-outer');
  var inner = document.getElementById('cursor-inner');
  var mx=0,my=0,ox=0,oy=0;
  document.addEventListener('mousemove', function(e){
    mx=e.clientX; my=e.clientY;
    inner.style.left=mx+'px'; inner.style.top=my+'px';
  });
  (function animate(){
    ox+=(mx-ox)*0.12; oy+=(my-oy)*0.12;
    outer.style.left=Math.round(ox*10)/10+'px';
    outer.style.top=Math.round(oy*10)/10+'px';
    requestAnimationFrame(animate);
  })();
  function addHover(el){
    if(!el)return;
    el.addEventListener('mouseenter',function(){ document.body.classList.add('cursor-hover'); });
    el.addEventListener('mouseleave',function(){ document.body.classList.remove('cursor-hover'); });
  }
  function addText(el){
    if(!el)return;
    el.addEventListener('mouseenter',function(){ document.body.classList.add('cursor-text'); });
    el.addEventListener('mouseleave',function(){ document.body.classList.remove('cursor-text'); });
  }
  // Apply to interactive elements after DOM ready
  document.querySelectorAll('a,button').forEach(addHover);
  document.querySelectorAll('input,textarea,select').forEach(addText);
})();
</script>

</body>
</html>
